name: Build and Release

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths: ["**/*.go", "go.mod", "go.sum", ".github/workflows/*.yml"]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Asset name
        id: name
        run: |
          NAME=$(jq -r ".[\"$GOOS-$GOARCH\"].friendlyName" < .github/build/friendly-filenames.json)
          echo "asset=exnode-$NAME" >> "$GITHUB_OUTPUT"

      - name: Version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "version=${GITHUB_SHA::8}" >> "$GITHUB_ENV"
          fi

      - name: Build
        run: |
          go build -trimpath -ldflags "-s -w -X main.version=$version" -o "${{ steps.name.outputs.asset }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.name.outputs.asset }}
          path: ${{ steps.name.outputs.asset }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.name.outputs.asset }}
          tag: ${{ github.ref }}
